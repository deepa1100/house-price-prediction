<!DOCTYPE html>
<html>
<head>

    <title>Login</title>

    <style>

        body{

            margin:0;
            padding:0;

            font-family: Arial, sans-serif;

            background:
                linear-gradient(
                    rgba(0,0,0,0.5),
                    rgba(0,0,0,0.5)
                ),

                url('https://images.unsplash.com/photo-1570129477492-45c003edd2be');

            background-size:cover;
            background-position:center;
            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-box{

            width:350px;

            background:rgba(255,255,255,0.15);

            padding:40px;

            border-radius:20px;

            backdrop-filter: blur(10px);

            box-shadow:0px 0px 20px rgba(0,0,0,0.5);

            color:white;

            text-align:center;
        }

        h1{
            margin-bottom:30px;
            font-size:32px;
        }

        input{

            width:100%;

            padding:12px;

            margin-top:15px;

            border:none;

            border-radius:10px;

            font-size:16px;
        }

        button{

            width:100%;

            padding:12px;

            margin-top:20px;

            background:#00c853;

            color:white;

            border:none;

            border-radius:10px;

            font-size:18px;

            cursor:pointer;

            transition:0.3s;
        }

        button:hover{

            background:#00e676;

            transform:scale(1.03);
        }

        .footer-text{

            margin-top:20px;

            font-size:14px;

            opacity:0.8;
        }

    </style>

</head>

<body>

<div class="login-box">

    <h1>🏠 Login</h1>

    <form method="POST">

        <input
            type="text"
            name="username"
            placeholder="Enter Username"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Enter Password"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>

    <div class="footer-text">
        Bangalore House Price Prediction System
    </div>

</div>

</body>
</html>
